name: Role Boundary Check

on:
  pull_request:
    branches: [main]

jobs:
  role-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only origin/main...HEAD > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt

      - name: Check role boundaries
        run: |
          python3 << 'EOF'
          import yaml
          import fnmatch
          import sys
          import os

          author = os.environ.get("PR_AUTHOR", "")

          with open(".github/roles.yaml") as f:
              config = yaml.safe_load(f)

          users = config.get("users", {})
          roles_config = config.get("roles", {})

          if author not in users:
              print(f"INFO: {author} not in roles.yaml -> no boundary restriction")
              sys.exit(0)

          role = users[author]["role"]
          allowed = roles_config.get(role, {}).get("allowed_paths", [])

          with open("/tmp/changed_files.txt") as f:
              changed = [line.strip() for line in f if line.strip()]

          violations = []
          for filepath in changed:
              if not any(fnmatch.fnmatch(filepath, pattern) for pattern in allowed):
                  violations.append(filepath)

          if violations:
              print(f"FAIL: {author} (role={role}) modified files outside allowed paths:")
              for v in violations:
                  print(f"  - {v}")
              print(f"Allowed paths for {role}: {allowed}")
              sys.exit(1)
          else:
              print(f"OK: {author} (role={role}) all changes within allowed paths")
          EOF
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
